<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVStudios | Smart Matcher Pro V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-main: #0f1115; --bg-card: #1a1d23; --border-color: #2b2f3a; --primary: #a855f7; }
        body { background: var(--bg-main); color: #e5e7eb; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border: 2px solid #333; border-top: 2px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Main Layout */
        .main-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
        
        /* Product Grid Card Styles */
        .product-card {
            position: relative; background: #131519; border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; transition: all 0.2s ease-out; cursor: pointer;
        }
        .product-card:hover { border-color: #4b5563; transform: translateY(-2px); }
        /* Selection State */
        .product-card.selected { border-color: var(--primary) !important; box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2); }
        .product-card.selected .select-overlay { opacity: 1; }
        
        /* Crop Visualization Overlay */
        .crop-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 70%; border: 2px dashed rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.6); pointer-events: none; border-radius: 4px;
        }

        /* Custom Scrollbar for results area */
        .results-grid::-webkit-scrollbar { width: 6px; }
        .results-grid::-webkit-scrollbar-track { background: transparent; }
        .results-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="pb-40">

    <div class="fixed top-0 inset-x-0 bg-[#0f1115]/95 backdrop-blur-xl z-50 border-b border-[#2b2f3a] px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="font-bold text-2xl tracking-tight"><span class="text-purple-500">Smart</span>Matcher <span class="text-xs text-gray-500 font-normal">V2</span></h1>
            <p class="text-zinc-500 text-sm">DINOv2 Texture Engine + Salient Object Auto-Crop</p>
            <span class="bg-purple-500/10 text-purple-300 text-xs px-3 py-1.5 rounded-full font-medium" id="queue-count">Loading...</span>
        </div>
        <div>
            <button id="analyze-all-btn" onclick="analyzeAll()" class="bg-white text-black hover:bg-gray-200 px-6 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-white/10 disabled:opacity-50 transition-all flex items-center gap-2">
                <i class="fa-solid fa-layer-group"></i> Match Batch Not Processed
            </button>
        </div>
    </div>

    <div class="h-24"></div> <div id="queue-container" class="max-w-7xl mx-auto px-4 space-y-10 relative z-10">
        <div class="flex flex-col items-center justify-center mt-32 opacity-50">
            <div class="loader mb-4 w-8 h-8 border-4"></div>
            <p>Loading pending requests...</p>
        </div>
    </div>

    <div class="fixed bottom-0 inset-x-0 z-50 bg-[#0f1115]/90 backdrop-blur-md border-t border-[#2b2f3a] p-4">
        <div class="max-w-2xl mx-auto">
            <button onclick="confirmSelections()" id="confirm-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white py-4 rounded-2xl font-bold text-lg shadow-2xl shadow-purple-900/30 flex justify-center items-center gap-3 transition-transform active:scale-[0.99]">
                Send <span id="selected-count">0</span> Selections <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <canvas id="cropCanvas" class="hidden"></canvas>
    <div id="img-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-8 cursor-zoom-out" onclick="this.classList.add('hidden')">
        <img id="img-modal-img" src="" class="max-h-full max-w-full rounded-xl shadow-2xl border border-gray-800" />
    </div>

    <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
    
    // --- CONFIG ---
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    const SUPABASE_URL = 'https://xgtnbxdxbbywvzrttixf.supabase.co';
    // NOTE: This Anon key is public, ensure RLS is set up correctly on Supabase.
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndG5ieGR4YmJ5d3Z6cnR0aXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0Nzg5NTAsImV4cCI6MjA3MjA1NDk1MH0.YGk0vFyIJEiSpu5phzV04Mh4lrHBlfYLFtPP_afFtMQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const businessId = params.get('bid');

    // --- STATE ---
    let pendingItems = [];
    let aiExtractor = null;
    let aiDetector = null;
    let selections = {}; // { queueId: { productId, message, productData } }
    // Changed to DinoV2 like dinovector.html
    const AI_MODEL_ID = 'Xenova/dinov2-base';

    // --- INIT ---
    async function init() {
        if(!businessId) {
            document.getElementById('queue-container').innerHTML = `<div class="text-center text-red-400 mt-20">Missing Business ID (?bid=...)</div>`;
            return;
        }

        // Fetch Pending Items
        const { data, error } = await supabase
            .from('pending_matches')
            .select('*')
            .eq('business_id', businessId)
            .eq('status', 'pending')
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            alert("Failed to fetch queue.");
            return;
        }
        
        pendingItems = data;
        document.getElementById('queue-count').innerText = `${data.length} Pending`;
        renderQueue();

        // Preload AI in background
        setTimeout(async () => {
            if(!aiExtractor || !aiDetector) {
                console.log(`🚀 Preloading AI Models: ${AI_MODEL_ID} and DETR...`);
                try {
                    aiExtractor = await pipeline('image-feature-extraction', AI_MODEL_ID, { quantized: true });
                    aiDetector = await pipeline('object-detection', 'Xenova/detr-resnet-50', { quantized: true });
                    console.log("✅ AI Ready");
                } catch (e) {
                    console.error("AI Load Failed:", e);
                    alert("Failed to load AI models. Check console.");
                }
            }
        }, 500);
    }

    function renderQueue() {
        const container = document.getElementById('queue-container');
        container.innerHTML = "";

        if(pendingItems.length === 0) {
            container.innerHTML = `<div class="flex flex-col items-center justify-center mt-32 text-gray-500"><i class="fa-solid fa-box-open text-5xl mb-4 opacity-30"></i><p class="text-xl">No pending matches</p></div>`;
            return;
        }

        pendingItems.forEach(item => {
            const el = document.createElement('div');
            el.className = "main-card p-5";
            el.id = `card-${item.id}`;
            
            // Card Header
            const timeAgo = new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            el.innerHTML = `
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-[#2b2f3a]">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#2b2f3a] flex items-center justify-center text-xl shadow-inner">
                            ${getPlatformIcon(item.platform)}
                        </div>
                        <div>
                            <div class="font-bold text-gray-200">${item.user_id || 'Unknown User'}</div>
                            <div class="text-xs text-gray-500 flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${timeAgo}</div>
                        </div>
                    </div>
                    <button onclick="dismissItem('${item.id}')" class="text-gray-500 hover:text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-colors" title="Dismiss Request"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
                    
                    <div class="md:col-span-4 flex flex-col gap-4">
                        <div class="relative group rounded-2xl overflow-hidden bg-black aspect-[3/4] shadow-2xl cursor-zoom-in" onclick="openModal('${item.image_url}')">
                            <img id="img-${item.id}" src="${item.image_url}" class="w-full h-full object-cover opacity-90 transition-opacity group-hover:opacity-100" crossorigin="anonymous">
                            <div class="crop-guide"></div> <div class="absolute bottom-3 left-3 right-3 text-center bg-black/70 text-[11px] text-gray-300 px-3 py-1.5 rounded-full backdrop-blur-md border border-white/10">
                                AI analyzes center 70% (highlighted)
                            </div>
                        </div>
                        
                        <div class="bg-[#15171c] rounded-2xl p-4 border border-[#2b2f3a]">
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Reply Message</label>
                                <button onclick="magicWrite('${item.id}')" class="text-xs text-purple-400 hover:text-purple-300 flex items-center gap-1 bg-purple-500/10 px-2 py-1 rounded-md transition-colors">
                                    <i class="fa-solid fa-wand-magic-sparkles"></i> Auto-Gen
                                </button>
                            </div>
                            <textarea id="msg-${item.id}" rows="3" class="w-full bg-black/20 border border-[#2b2f3a] rounded-xl p-3 text-sm text-gray-200 focus:outline-none focus:border-purple-500/50 placeholder-gray-600 resize-none transition-colors" placeholder="Write a reply or select a product to auto-fill..."></textarea>
                        </div>
                    </div>

                    <div class="md:col-span-8 flex flex-col h-full min-h-[500px]">
                        
                        <div class="flex gap-3 mb-4">
                             <div class="relative flex-1">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="text" id="search-${item.id}" 
                                    class="w-full bg-[#15171c] border border-[#2b2f3a] rounded-xl py-3 pl-11 pr-4 text-sm text-gray-200 focus:border-purple-500/50 focus:outline-none focus:bg-[#1a1d23] transition-all shadow-sm"
                                    placeholder="Manual Search (e.g. 'Nike Air Force')"
                                    onkeydown="if(event.key === 'Enter') manualSearch('${item.id}')">
                            </div>
                             <button onclick="manualSearch('${item.id}')" class="bg-[#2b2f3a] hover:bg-[#3f4454] text-gray-300 px-4 rounded-xl border border-[#2b2f3a] transition-colors" title="Search Database">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>
                            <div class="w-px bg-[#2b2f3a] mx-1"></div>
                            <button onclick="processItem('${item.id}')" class="bg-purple-600/20 hover:bg-purple-600/30 text-purple-400 px-5 py-3 rounded-xl border border-purple-500/30 font-semibold text-sm flex items-center gap-2 transition-all active:scale-95">
                                <i class="fa-solid fa-bolt"></i> AI Match
                            </button>
                        </div>

                        <div id="results-${item.id}" class="results-grid flex-1 bg-[#131519] rounded-2xl border border-[#2b2f3a] p-4 overflow-y-auto max-h-[600px] relative">
                            <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 gap-3">
                                <i class="fa-brands fa-searchengin text-4xl opacity-20"></i>
                                <span class="text-sm font-medium">Ready to search or match</span>
                            </div>
                        </div>

                    </div>
                </div>
            `;
            container.appendChild(el);
        });
    }

    // --- CORE LOGIC ---

    // 1. Auto-Crop (DETR AI) - Like dinovector.html
    async function processAutoCrop(imgUrl) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl;
            img.onload = async () => {
                const detections = await aiDetector(imgUrl, { threshold: 0.3 });
                let box = null;
                
                if (detections.length > 0) {
                    box = detections.reduce((p, c) => {
                        const pA = (p.box.xmax - p.box.xmin) * (p.box.ymax - p.box.ymin);
                        const cA = (c.box.xmax - c.box.xmin) * (c.box.ymax - c.box.ymin);
                        return cA > pA ? c : p;
                    }).box;
                }

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                let sX, sY, cW, cH;
                if (box) {
                    const padW = (box.xmax - box.xmin) * 0.12;
                    const padH = (box.ymax - box.ymin) * 0.12;
                    sX = Math.max(0, box.xmin - padW);
                    sY = Math.max(0, box.ymin - padH);
                    cW = Math.min(img.width, box.xmax + padW) - sX;
                    cH = Math.min(img.height, box.ymax + padH) - sY;
                } else {
                    cW = img.width * 0.75; cH = img.height * 0.75;
                    sX = (img.width - cW) / 2; sY = (img.height - cH) / 2;
                }

                canvas.width = 224; canvas.height = 224;
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,224,224);
                ctx.drawImage(img, sX, sY, cW, cH, 0, 0, 224, 224);
                resolve(canvas);
            };
            img.onerror = reject;
        });
    }

    // 2. Image Pre-processor with Auto-Crop
    async function getCroppedEmbedding(imgUrl) {
        const canvas = await processAutoCrop(imgUrl);
        const output = await aiExtractor(canvas.toDataURL('image/jpeg', 0.9));
        return Array.from(output.data);
    }

    // 3. AI Match Function (Vector Search)
    window.processItem = async (itemId) => {
        if(!aiExtractor || !aiDetector) return alert("AI models still loading. Please wait.");
        setLoading(itemId, true, "AI Analyzing Image...");

        try {
            const item = pendingItems.find(i => i.id === itemId);
            const embedding = await getCroppedEmbedding(item.image_url);

            // Using existing image match RPC
            const { data: products, error } = await supabase.rpc('match_image_products_v1', {
                query_embedding: embedding,
                match_threshold: 0.35, // Adjusted for DinoV2
                match_count: 12, // Fetch more for the grid view
                filter_business_id: businessId
            });

            if(error) throw error;
            renderResults(itemId, products, "No visual matches found. Try manual search.");
        } catch(e) {
            console.error(e);
            setError(itemId, `AI Error: ${e.message || e.details}`);
        }
    };

    // 3. Manual Search Function (Updated to match match_products_v5 schema)
    window.manualSearch = async (itemId) => {
        const query = document.getElementById(`search-${itemId}`).value.trim();
        if(!query) return;
        setLoading(itemId, true, "Searching Database...");

        try {
            // Your RPC requires 5 arguments. 
            // We send a zero-vector for embedding so it relies on the ILIKE text match.
            const { data: products, error } = await supabase.rpc('match_products_v5', {
                query_embedding: new Array(768).fill(0), // Dummy vector for DinoV2 (768 dims)
                match_threshold: 0,                      // Set to 0 to prioritize text matches
                match_count: 15,
                filter_business_id: businessId,
                query_text: query
            });

            if(error) throw error;
            
            renderResults(itemId, products, `No products found for "${query}"`);

        } catch(e) {
            console.error(e);
            setError(itemId, `Search Error: ${e.message}`);
        }
    }

    // 4. Render Results (NEW GRID UI)
    function renderResults(itemId, products, emptyMsg) {
        const container = document.getElementById(`results-${itemId}`);
        container.innerHTML = "";
        
        if(!products || products.length === 0) {
            container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-500 text-sm p-4 text-center"><i class="fa-regular fa-face-frown-open text-3xl mb-2 opacity-40"></i>${emptyMsg}</div>`;
            return;
        }

        // Grid Container
        const grid = document.createElement('div');
        grid.className = "grid grid-cols-3 gap-4"; // 3 Columns defined here

        products.forEach(p => {
            const imgUrl = Array.isArray(p.images) ? p.images[0] : p.images;
            // Calculate percentage match (simple conversion from cosine distance if present)
            // Assuming similarity is 0-1 where 1 is perfect.
            const matchPercent = p.similarity ? Math.round(p.similarity * 100) : null;
            
            const card = document.createElement('div');
            // Base styling for the product card
            card.className = "product-card group";
            card.dataset.pid = p.id;
            
            card.innerHTML = `
                <div class="aspect-square relative bg-black/50">
                    <img src="${imgUrl}" class="w-full h-full object-cover" loading="lazy">
                    
                    ${matchPercent ? `
                        <div class="absolute top-2 right-2 bg-green-500/90 backdrop-blur text-white text-[10px] font-bold px-2 py-0.5 rounded-full z-20 shadow-sm flex items-center gap-1">
                           <i class="fa-solid fa-fingerprint"></i> ${matchPercent}%
                        </div>
                    ` : ''}

                    <div class="select-overlay absolute inset-0 bg-purple-600/40 backdrop-blur-[2px] flex items-center justify-center opacity-0 transition-opacity z-10">
                        <i class="fa-solid fa-circle-check text-4xl text-white drop-shadow-lg scale-90 group-[.selected]:scale-100 transition-transform"></i>
                    </div>
                </div>
                
                <div class="p-3 bg-[#1a1d23]">
                    <div class="text-sm font-medium text-gray-200 truncate leading-tight mb-1" title="${p.title}">${p.title}</div>
                    <div class="text-xs text-purple-400 font-mono font-semibold">${Number(p.price).toLocaleString()} KES</div>
                </div>
            `;

            card.addEventListener('click', () => toggleSelection(itemId, p, card));
            grid.appendChild(card);
        });
        container.appendChild(grid);
        // Restore selection state if repopulating
        if(selections[itemId]) {
            const selectedCard = grid.querySelector(`[data-pid="${selections[itemId].product_id}"]`);
            if(selectedCard) selectedCard.classList.add('selected');
        }
    }

    // 5. Selection Logic (Updated for new UI)
    function toggleSelection(queueId, product, cardElement) {
        const container = document.getElementById(`results-${queueId}`);
        const currentSelection = selections[queueId];

        // Deselect all others in this container
        container.querySelectorAll('.product-card.selected').forEach(c => c.classList.remove('selected'));

        if (currentSelection && currentSelection.product_id === product.id) {
            // Deselect if clicking the same one
            delete selections[queueId];
        } else {
            // Select new one
            cardElement.classList.add('selected');
            selections[queueId] = { product_id: product.id, productData: product };
            
            // Auto-draft message if empty
            const textArea = document.getElementById(`msg-${queueId}`);
            if(textArea.value.trim() === "") {
                 textArea.value = `Hi there! We have the ${product.title} available for ${Number(product.price).toLocaleString()} KES. Shall we proceed?`;
            }
        }
        updateStats();
    }

    // 6. Batch Processor
    window.analyzeAll = async () => {
        const btn = document.getElementById('analyze-all-btn');
        if(btn.disabled) return;
        btn.disabled = true;
        btn.innerHTML = `<div class="loader w-4 h-4 border-2 border-t-black"></div> Processing Batch...`;

        // Ensure AI is ready
        if(!aiExtractor || !aiDetector) {
            aiExtractor = await pipeline('image-feature-extraction', AI_MODEL_ID, { quantized: true });
            aiDetector = await pipeline('object-detection', 'Xenova/detr-resnet-50', { quantized: true });
        }

        // Process serially to avoid choking browser
        for (const item of pendingItems) {
            // Skip if already selected or currently loading
            if(selections[item.id]) continue;
             // Scroll into view
            document.getElementById(`card-${item.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            await processItem(item.id);
            // Small delay between items
            await new Promise(r => setTimeout(r, 500));
        }

        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-check-double"></i> Batch Complete`;
        setTimeout(() => btn.innerHTML = `<i class="fa-solid fa-layer-group"></i> Match Batch Not Processed`, 3000);
    };

    // 7. Final Confirmation Send
    window.confirmSelections = async () => {
        const queueIds = Object.keys(selections);
        if(queueIds.length === 0) return alert("Please select at least one product match.");

        const btn = document.getElementById('confirm-btn');
        const originalContent = btn.innerHTML;
        btn.innerHTML = `<div class="loader border-white/30 border-t-white"></div> Sending ${queueIds.length} Matches...`;
        btn.disabled = true;

        const batchPayload = queueIds.map(qid => ({
            queue_id: qid,
            product_id: selections[qid].product_id,
            message: document.getElementById(`msg-${qid}`).value || null
        }));

        try {
            const { error } = await supabase.functions.invoke('process-queue-batch', {
                body: { batch: batchPayload, business_id: businessId }
            });

            if(error) throw error;

            // Success UI Feedback
            queueIds.forEach(qid => {
                const card = document.getElementById(`card-${qid}`);
                card.style.transform = 'scale(0.95)'; card.style.opacity = '0';
                setTimeout(() => card.remove(), 300);
            });
            selections = {};
            updateStats();
            btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> Sent Successfully!`;
            // Refetch remaining after a delay
            setTimeout(() => { btn.disabled = false; btn.innerHTML = originalContent; init(); }, 2000);

        } catch(e) {
            console.error(e);
            alert("Error sending batch: " + e.message);
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    };

    // --- UTILITIES ---
    function setLoading(id, isLoading, msg) {
        const container = document.getElementById(`results-${id}`);
        if(isLoading) {
            container.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-[#131519]/80 backdrop-blur-sm"><div class="loader mb-3"></div><span class="text-xs font-medium text-purple-300 animate-pulse">${msg}</span></div>`;
        }
    }

    function setError(id, msg) {
        document.getElementById(`results-${id}`).innerHTML = `<div class="absolute inset-0 flex items-center justify-center text-red-400 text-sm font-medium p-4 text-center border-2 border-red-500/20 rounded-2xl bg-red-500/10"><i class="fa-solid fa-circle-exclamation mr-2"></i> ${msg}</div>`;
    }

    window.magicWrite = (id) => {
        const sel = selections[id];
        const ta = document.getElementById(`msg-${id}`);
        if(!sel) return ta.placeholder = "Select a product first to auto-gen!";
        
        const templates = [
            `Good news! We found the ${sel.productData.title}. It's currently ${Number(sel.productData.price).toLocaleString()} KES.`,
            `Here is the closest match we have: ${sel.productData.title} @ ${Number(sel.productData.price).toLocaleString()} KES.`,
            `Found it! The ${sel.productData.title} is in stock.`
        ];
        ta.value = templates[Math.floor(Math.random() * templates.length)];
    }

    window.dismissItem = async (id) => {
        if(!confirm("Dismiss this request permanently?")) return;
        document.getElementById(`card-${id}`).style.opacity = '0.5';
        await supabase.from('pending_matches').update({ status: 'dismissed' }).eq('id', id);
        document.getElementById(`card-${id}`).remove();
    };

    window.openModal = (src) => {
        document.getElementById('img-modal-img').src = src;
        document.getElementById('img-modal').classList.remove('hidden');
    }

    function updateStats() {
        document.getElementById('selected-count').innerText = Object.keys(selections).length;
    }

    function getPlatformIcon(p) {
        const icons = {
            'whatsapp': '<i class="fa-brands fa-whatsapp text-[#25D366]"></i>',
            'facebook': '<i class="fa-brands fa-facebook text-[#1877F2]"></i>',
            'instagram': '<i class="fa-brands fa-instagram text-[#E4405F]"></i>'
        };
        return icons[p] || '<i class="fa-solid fa-comment-dots text-gray-400"></i>';
    }

    // Start Application
    init();
    </script>
</body>
</html>
