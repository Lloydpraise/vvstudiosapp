        // --- ADD THIS NEW HELPER FUNCTION ---
        function extractDominantColors(sourceCanvas) {
            const ctx = sourceCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height).data;
            const colorCounts = {};
            const quantization = 50; // Group similar colors

            for (let i = 0; i < imageData.length; i += 4) {
                const r = Math.floor(imageData[i] / quantization) * quantization;
                const g = Math.floor(imageData[i + 1] / quantization) * quantization;
                const b = Math.floor(imageData[i + 2] / quantization) * quantization;
                const key = `${r},${g},${b}`;
                colorCounts[key] = (colorCounts[key] || 0) + 1;
            }

            // Sort by frequency and take top 3
            const sorted = Object.entries(colorCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);
            
            return sorted.map(([key]) => {
                const [r, g, b] = key.split(',').map(Number);
                // Convert to Hex
                const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                return { r, g, b, hex };
            });
        }

        // Alias for legacy code that expects `extractColors`
        function extractColors(c) { return extractDominantColors(c); }

        async function processNext() {
    if (!isRunning || queue.length === 0) {
        stopWorker();

    const item = queue.shift();
    updateQueueUI();

    try {
        let images = item.shopify_images || item.images || [];

        // Only take the first 3 images to match your new database columns
        const imagesToProcess = images.slice(0, 3);
        let allVectors = [];
        let mainCanvas = null;
        let mainCropStats = null;

        for (let i = 0; i < imagesToProcess.length; i++) {
            // Yield to UI: allows the browser to paint and prevents freezing
            await new Promise(r => requestAnimationFrame(r));
            
            const result = await processAutoCrop(imagesToProcess[i]);
            
            if (i === 0) {
                mainCanvas = result.canvas;

            }

            // AI Vector Extraction
            const output = await aiExtractor(result.canvas.toDataURL('image/jpeg', 0.9));
            
            // FIX: Convert to array and slice to exactly 768 dimensions.
            // This stops the "vector cannot have more than 16000 dimensions" error.
            let vectorArray = Array.from(output.data);
            if (vectorArray.length > 768) {
                vectorArray = vectorArray.slice(0, 768);
            }
            
            allVectors.push(vectorArray);
            
            // Give CPU a tiny break between images
            await new Promise(r => setTimeout(r, 20));

        pendingResults[item.id] = {
            id: item.id,
            title: item.title,
            originalUrl: images[0],

            colors: extractColors(mainCanvas),

        setTimeout(processNext, 50);

    } catch (err) {
        console.error("Process failed for", item.id, err);
        setTimeout(processNext, 50);
    }
}

        async function processAutoCrop(imgUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imgUrl;
                img.onload = async () => {
                    let detections = [];
                    try {
                        // Look for specific items
                        detections = await aiDetector(imgUrl, { threshold: 0.3 });
                    } catch (e) { console.warn('Detector error:', e); }

                    let targetBox = null;
                    if (detections && detections.length > 0) {
                        // Specific classes for bags
                        const bagLabels = ['handbag', 'backpack', 'suitcase', 'bag'];
                        const bagHits = detections.filter(d => bagLabels.includes(d.label?.toLowerCase()));
                        
                        // If we found a bag, use that. Otherwise use the biggest object (best for shoes).
                        const searchPool = bagHits.length > 0 ? bagHits : detections;
                        
                        targetBox = searchPool.reduce((prev, curr) => {
                            const prevArea = (prev.box.xmax - prev.box.xmin) * (prev.box.ymax - prev.box.ymin);
                            const currArea = (curr.box.xmax - curr.box.xmin) * (curr.box.ymax - curr.box.ymin);
                            return (currArea > prevArea) ? curr : prev;
                        }).box;
                    }

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let startX, startY, cropW, cropH;

                    if (targetBox) {
                        // Add 10% padding so we don't cut the item off
                        const padW = (targetBox.xmax - targetBox.xmin) * 0.1;
                        const padH = (targetBox.ymax - targetBox.ymin) * 0.1;
                        startX = Math.max(0, targetBox.xmin - padW);
                        startY = Math.max(0, targetBox.ymin - padH);
                        cropW = Math.min(img.width, targetBox.xmax + padW) - startX;
                        cropH = Math.min(img.height, targetBox.ymax + padH) - startY;
                    } else {
                        // Fallback to center crop
                        cropW = img.width * 0.8;
                        cropH = img.height * 0.8;
                        startX = (img.width - cropW) / 2;
                        startY = (img.height - cropH) / 2;
                    }

                    canvas.width = cropW;
                    canvas.height = cropH;
                    ctx.drawImage(img, startX, startY, cropW, cropH, 0, 0, cropW, cropH);

                    resolve({
                        canvas: canvas,
                        cropStats: {
                            x: (startX / img.width) * 100,
                            y: (startY / img.height) * 100,
                            w: (cropW / img.width) * 100,
                            h: (cropH / img.height) * 100,
                            auto: !!targetBox
                        }
                    });
                };
                img.onerror = reject;
            });
        }

        await updateManualCrop(id, canvas);
        if(btn) {
            btn.innerHTML = `<i class="fa-solid fa-check-circle mr-2"></i> Processed`;
            btn.classList.add('bg-green-600', 'text-white');
        }
        setTimeout(() => { closeModal(); renderCard(id); }, 400);
    } catch (e) {
        console.error('applyCropperCrop: manual update failed', e);
        if(btn) { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-save"></i>`; }
    }
};

// --- Manual Crop Rerun: Re-vectorize only the main image when user saves a manual crop ---
window.updateManualCrop = async (id, croppedCanvas) => {
    const data = pendingResults[id];
    if (!data) throw new Error('No pending result for id ' + id);
    const dataUrl = croppedCanvas.toDataURL('image/jpeg', 0.9);

    // Rerun feature extraction on the manual crop
    const output = await aiExtractor(dataUrl);

    // Ensure vectors array exists
    data.vectors = data.vectors || [];
    // Convert to plain array and enforce 768-dim truncation (match auto-run behavior)
    let manualVec = Array.from(output.data);
    if (manualVec.length > 768) manualVec = manualVec.slice(0, 768);
    data.vectors[0] = manualVec;
    data.cropped = dataUrl;
    data.colors = extractColors(croppedCanvas);
    data.isAdjusted = true;

    renderCard(id);
    updateStats();
    console.log('Manual update complete for', id);
};


        // --- 5. SAVE LOGIC ---

window.saveOne = async (id) => {
    const data = pendingResults[id];
    if (!data) return;

    const btn = document.querySelector(`#card-${id} button`);
    if (btn) btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;
    
    try {
        // Map the collected vectors to the three specific database columns.
        // If a product has fewer than 3 images, the remaining columns will be null.
        const updateData = {
            vectorized: true,
            vector_1: (data.vectors && data.vectors[0]) ? data.vectors[0] : null,
            vector_2: (data.vectors && data.vectors[1]) ? data.vectors[1] : null,
            vector_3: (data.vectors && data.vectors[2]) ? data.vectors[2] : null,
            color_palette: data.colors
        };

        const { error: dbError } = await supabaseClient
            .from('products')
            .update(updateData)
            .eq('id', id);

        if (dbError) throw dbError;

        pendingResults[id].status = 'saved';
        renderCard(id); 
        updateStats();

    } catch (e) {
        console.error("Database Save Error:", e);
        // This error is typically resolved by the .slice(0, 768) logic 
        // added to the vector extraction process.
        alert("Save failed: " + (e.message || "Unknown error"));
        if (btn) btn.innerHTML = `<i class="fa-solid fa-save"></i>`;
    }
};

window.saveAll = async () => {
    const unsaved = Object.values(pendingResults).filter(p => p.status === 'pending');
    if (unsaved.length === 0) return;

    if (!confirm(`Overwrite ${unsaved.length} vectors in database?`)) return;

    const btn = document.getElementById('saveAllBtn');
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...`;

    // Loop through the queue and call saveOne for each item
    for (const item of unsaved) {
        await window.saveOne(item.id);
    }

    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save All Verified`;
};

        // --- 6. DATA LOADING ---

        window.loadQueue = async () => {
            const bid = document.getElementById('businessId').value;
            const list = document.getElementById('queueList');
            
            list.innerHTML = `<div class="text-center py-4 text-white/50">Fetching All...</div>`;
            
            // Only fetch products that have NOT been vectorized yet
            const { data, error } = await supabaseClient
                .from('products')
                .select('id, title, images')
                .eq('business_id', bid)
                .eq('vectorized', false) // <--- Only fetch what hasn't been done
                .not('images', 'is', null)
                .limit(100); // Increased batch size

            if (error) return alert("Error: " + error.message);

            queue = (data || []).filter(p => !pendingResults[p.id]);
            
            updateQueueUI();
        };

        function updateQueueUI() {
            const list = document.getElementById('queueList');
            document.getElementById('queueBadge').innerText = queue.length;
            list.innerHTML = '';
            
            if(queue.length === 0) {
                 list.innerHTML = `<div class="text-center text-green-400 text-xs py-10">Queue cleared!</div>`;
                 return;
            }

            queue.forEach((p, idx) => {
                const el = document.createElement('div');
                el.className = "text-xs text-white/50 truncate p-2 border-b border-white/5";
                el.innerText = `${idx + 1}. ${p.title}`;
                list.appendChild(el);
            });
        }

        function updateStats() {
            const all = Object.values(pendingResults);
            const saved = all.filter(x => x.status === 'saved').length;
            const pending = all.length - saved;

            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('savedCount').innerText = saved;
            
            const saveAllBtn = document.getElementById('saveAllBtn');
            saveAllBtn.disabled = pending === 0;
            saveAllBtn.classList.toggle('opacity-30', pending === 0);
        }

        window.loadQueue = loadQueue;
        window.startWorker = startWorker;
        window.stopWorker = stopWorker;
        window.saveAll = saveAll;
        window.saveOne = saveOne;
        window.openEditModal = openEditModal;
        window.closeModal = closeModal;
        window.toggleAspectRatio = toggleAspectRatio;
        window.applyCropperCrop = applyCropperCrop;
    </script>
</body>
</html>
