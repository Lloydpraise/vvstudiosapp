<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Visual Matcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-[#0f1115] text-white font-sans p-6 min-h-screen">
    
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-1/3 flex flex-col gap-4">
            <h2 class="text-xl font-bold border-b border-gray-700 pb-2">1. Input (Base64)</h2>
            
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center bg-[#1a1d23] hover:border-purple-500 transition-colors cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <i class="fa fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                <p class="text-sm text-gray-300">Click to upload screenshot</p>
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleUpload(event)">
            </div>

            <div id="previewContainer" class="hidden flex-col gap-2">
                <span class="text-xs text-gray-400">Image Preview:</span>
                <img id="imagePreview" class="w-full h-auto rounded-lg border border-gray-700 object-contain max-h-64" src="">
            </div>

            <div class="bg-black/50 border border-gray-700 rounded-lg p-3 font-mono text-xs flex flex-col gap-1 h-48 overflow-y-auto" id="consoleLog">
                <div class="text-gray-500">> System Ready. Waiting for image...</div>
            </div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col gap-4">
            <div class="flex justify-between items-end border-b border-gray-700 pb-2">
                <h2 class="text-xl font-bold">2. Top Matches</h2>
                <span id="statusBadge" class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400">Standby</span>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <div class="col-span-3 text-center text-gray-600 py-10">Upload an image to see matches</div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const FUNCTION_URL = "https://xgtnbxdxbbywvzrttixf.supabase.co/functions/v1/visual-matcher"; 
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhndG5ieGR4YmJ5d3Z6cnR0aXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0Nzg5NTAsImV4cCI6MjA3MjA1NDk1MH0.YGk0vFyIJEiSpu5phzV04Mh4lrHBlfYLFtPP_afFtMQ";
    
        // Logging helper
        function logMsg(msg, type = 'info') {
            const logBox = document.getElementById('consoleLog');
            const colors = { error: 'text-red-400', success: 'text-green-400', info: 'text-blue-300', warn: 'text-orange-400' };
            logBox.innerHTML += `<div class="${colors[type]}">> ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('previewContainer').classList.remove('hidden');
            const preview = document.getElementById('imagePreview');
            const grid = document.getElementById('resultsGrid');
            const badge = document.getElementById('statusBadge');
            
            grid.innerHTML = '';
            document.getElementById('consoleLog').innerHTML = ''; // clear logs
            
            // 1. Convert to Base64 (simulating WhatsApp/Bot payload)
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64String = e.target.result;
                preview.src = base64String;
                
                logMsg(`File loaded: ${file.name} (${Math.round(file.size/1024)}kb)`);
                logMsg(`Converted to Base64. Sending payload to Edge Function...`, 'info');
                
                badge.className = "text-xs px-2 py-1 rounded bg-blue-900/50 text-blue-400 border border-blue-700 animate-pulse";
                badge.innerText = "Analyzing Server-Side...";

                try {
                    // 2. Send JSON to Edge Function
                    const response = await fetch(FUNCTION_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${ANON_KEY}`
                        },
                        body: JSON.stringify({ image: base64String })
                    });

                    const data = await response.json();

                    if (!response.ok || !data.success) {
                        throw new Error(data.error || `HTTP ${response.status}: Failed to process`);
                    }

                    logMsg(`Success! Extracted Colors: ${data.colors_detected.join(', ')}`, 'success');
                    logMsg(`Database returned ${data.matches.length} matches.`, 'success');
                    
                    badge.className = "text-xs px-2 py-1 rounded bg-green-900/50 text-green-400 border border-green-700";
                    badge.innerText = "Analysis Complete";

                    renderResults(data.matches);

                } catch (err) {
                    logMsg(err.message, 'error');
                    badge.className = "text-xs px-2 py-1 rounded bg-red-900/50 text-red-400 border border-red-700";
                    badge.innerText = "Error Occurred";
                }
            };
            reader.readAsDataURL(file);
        }

        function renderResults(matches) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            // Limit to top 6
            const topMatches = matches.slice(0, 6);

            topMatches.forEach((item) => {
                // Parse image array
                let imgs = item.shopify_images || [];
                if (typeof imgs === 'string') {
                    try { imgs = JSON.parse(imgs); } catch { imgs = [imgs]; }
                }
                const imgUrl = imgs[0] || 'https://via.placeholder.com/300';
                
                // Calculate percentages
                const totalScore = Math.round((item.final_score || 0) * 100);
                
                // Trigger bonus UI if vector score is exceptionally high 
                // (simulating a multi-view match from the SQL function)
                const hasBonus = item.vector_score > 0.85;

                grid.innerHTML += `
                    <div class="bg-[#1a1d23] rounded-lg border border-gray-700 overflow-hidden relative group">
                        <div class="absolute top-2 right-2 flex flex-col items-end gap-1 z-10">
                            <div class="bg-green-500/90 text-white text-[10px] font-bold px-2 py-1 rounded shadow">
                                ${totalScore}% Match
                            </div>
                            ${hasBonus ? `
                            <div class="bg-orange-500/90 text-white text-[10px] font-bold px-2 py-1 rounded shadow flex items-center gap-1">
                                <i class="fa fa-fire"></i> +5% Multi-Hit
                            </div>` : ''}
                        </div>

                        <div class="h-48 bg-black/40 p-2 flex items-center justify-center">
                            <img src="${imgUrl}" class="max-h-full max-w-full object-contain mix-blend-lighten group-hover:scale-105 transition-transform duration-300">
                        </div>

                        <div class="p-3 border-t border-gray-700">
                            <div class="text-sm text-gray-200 line-clamp-1 font-medium" title="${item.title}">${item.title}</div>
                            <div class="text-[10px] text-gray-500 mt-1 font-mono">ID: ${item.id.split('_').pop()}</div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
